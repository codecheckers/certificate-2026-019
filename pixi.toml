[workspace]
authors = ["jan <152862650+j-haacker@users.noreply.github.com>"]
channels = ["conda-forge", "bioconda"]
name = "certificate-2026-019"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
snakemake-minimal = ">=9.23.0,<10"
curl = ">=8.20.0,<9"
p7zip = ">=16.2,<17"
coreutils = ">=9.5,<10"

[feature.codecheck]
channels = ["conda-forge", "main", "r", "msys2"]

[feature.codecheck.dependencies]
python = ">=3.9"
nbconvert = ">=6"
notebook = ">=6"
jupyterlab = "*"
matplotlib = ">=3.4"
pandas = ">=1.3"
tabulate = "*"
pyyaml = "*"
pytest = ">=7.0"
pytest-cov = "*"
requests = "*"
session-info2 = "*"
ipywidgets = "*"
typst = ">=0.15.0,<0.16"

[feature.codecheck.tasks]
codecheck = {
    cmd = "bash notebook_to_pdf.sh",
    cwd = "codecheck",
    default-environment = "codecheck"
}

[environments]
codecheck = { features = ["codecheck"], no-default-feature = true }
